<!DOCTYPE html>
<html lang="en" data-theme="pink">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Together ✦ Couples' GTD</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  /* ─── CSS Variables ─── */
  :root {
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
  }

  [data-theme="pink"] {
    --bg-base:       #fdf6f0;
    --bg-surface:    #ffffff;
    --bg-surface2:   #fef0f5;
    --bg-sidebar:    #fff5f8;
    --border:        #fce4ee;
    --border-soft:   #fde8f0;
    --text-primary:  #3d1a2e;
    --text-secondary:#8c5a72;
    --text-muted:    #c49ab0;
    --accent:        #f472a8;
    --accent-soft:   #fce7f3;
    --accent-hover:  #ec4899;
    --tag-household: #fde68a;
    --tag-household-text: #92400e;
    --tag-personal:  #fbcfe8;
    --tag-personal-text: #9d174d;
    --tag-work:      #bfdbfe;
    --tag-work-text: #1e40af;
    --tag-yoga:      #d9f99d;
    --tag-yoga-text: #3f6212;
    --shadow-card:   0 2px 16px rgba(244,114,168,0.10), 0 1px 4px rgba(244,114,168,0.06);
    --shadow-hover:  0 8px 32px rgba(244,114,168,0.18), 0 2px 8px rgba(244,114,168,0.10);
    --shadow-modal:  0 24px 80px rgba(61,26,46,0.18);
    --nav-active-bg: #fce7f3;
    --nav-active-text: #ec4899;
    --checkbox-color: #f472a8;
    --scrollbar-thumb: #fbc8df;
  }

  [data-theme="dark"] {
    --bg-base:       #0f0f13;
    --bg-surface:    #1a1a24;
    --bg-surface2:   #22222e;
    --bg-sidebar:    #15151f;
    --border:        #2e2e3e;
    --border-soft:   #252535;
    --text-primary:  #f0eef8;
    --text-secondary:#9e9bb8;
    --text-muted:    #5c5a72;
    --accent:        #a78bfa;
    --accent-soft:   #2d2250;
    --accent-hover:  #c4b5fd;
    --tag-household: #3d3000;
    --tag-household-text: #fde68a;
    --tag-personal:  #3b0a2a;
    --tag-personal-text: #fbcfe8;
    --tag-work:      #0c2b5c;
    --tag-work-text: #93c5fd;
    --tag-yoga:      #142800;
    --tag-yoga-text: #bbf7d0;
    --shadow-card:   0 2px 16px rgba(0,0,0,0.4), 0 1px 4px rgba(0,0,0,0.3);
    --shadow-hover:  0 8px 32px rgba(0,0,0,0.6), 0 2px 8px rgba(0,0,0,0.4);
    --shadow-modal:  0 24px 80px rgba(0,0,0,0.8);
    --nav-active-bg: #2d2250;
    --nav-active-text: #c4b5fd;
    --checkbox-color: #a78bfa;
    --scrollbar-thumb: #3a3a52;
  }

  /* ─── Base Resets ─── */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-base);
    color: var(--text-primary);
    transition: background 0.3s var(--ease-smooth), color 0.3s var(--ease-smooth);
  }

  h1, h2, h3 { font-family: 'DM Serif Display', serif; }

  /* ─── Scrollbar ─── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 99px; }

  /* ─── Layout ─── */
  #app { display: flex; height: 100vh; }

  /* ─── Sidebar ─── */
  #sidebar {
    width: 260px; min-width: 260px;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    transition: background 0.3s, border-color 0.3s;
    z-index: 10;
  }
  .sidebar-logo {
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo h1 {
    font-size: 1.35rem;
    color: var(--text-primary);
    line-height: 1.2;
  }
  .sidebar-logo span {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .sidebar-user {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .user-avatar {
    width: 32px; height: 32px; border-radius: 99px;
    background: var(--accent-soft);
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 600;
  }
  .user-email { font-size: 0.75rem; color: var(--text-secondary); flex: 1; truncate; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .nav-section { padding: 20px 12px 8px; flex: 1; overflow-y: auto; }
  .nav-label {
    font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-muted); padding: 0 12px 8px; font-weight: 600;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; border-radius: 12px; cursor: pointer;
    color: var(--text-secondary); font-size: 0.875rem; font-weight: 500;
    transition: all 0.18s var(--ease-smooth); margin-bottom: 2px;
    user-select: none;
  }
  .nav-item:hover { background: var(--border-soft); color: var(--text-primary); }
  .nav-item.active { background: var(--nav-active-bg); color: var(--nav-active-text); font-weight: 600; }
  .nav-item .icon { width: 20px; text-align: center; font-size: 1rem; }
  .nav-badge {
    margin-left: auto; background: var(--accent); color: white;
    font-size: 0.65rem; font-weight: 700; border-radius: 99px;
    min-width: 18px; height: 18px; display: flex; align-items: center; justify-content: center;
    padding: 0 5px;
  }
  .sidebar-bottom { padding: 16px 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  .sidebar-btn {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 9px 12px; border-radius: 10px; cursor: pointer;
    font-size: 0.8rem; font-weight: 500; color: var(--text-secondary);
    background: transparent; border: 1px solid var(--border);
    transition: all 0.18s var(--ease-smooth);
  }
  .sidebar-btn:hover { background: var(--border-soft); color: var(--text-primary); }

  /* ─── Main Content ─── */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #topbar {
    padding: 20px 32px 0;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .view-title { font-size: 1.8rem; color: var(--text-primary); }
  .view-subtitle { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; font-family: 'DM Sans', sans-serif; }
  .add-task-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 11px 20px; border-radius: 14px;
    background: var(--accent); color: white;
    font-size: 0.875rem; font-weight: 600; cursor: pointer;
    border: none; box-shadow: 0 4px 14px rgba(244,114,168,0.35);
    transition: all 0.2s var(--ease-spring);
  }
  .add-task-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(244,114,168,0.45); background: var(--accent-hover); }
  .add-task-btn:active { transform: translateY(0); }
  [data-theme="dark"] .add-task-btn { box-shadow: 0 4px 14px rgba(167,139,250,0.35); }
  [data-theme="dark"] .add-task-btn:hover { box-shadow: 0 6px 20px rgba(167,139,250,0.45); }

  #content-area {
    flex: 1; overflow-y: auto; padding: 20px 32px 40px;
  }

  /* ─── Category Groups ─── */
  .category-group { margin-bottom: 28px; }
  .category-group-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border-soft);
  }
  .category-group-header h3 {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--text-muted);
  }
  .category-group-header .cat-emoji { font-size: 1rem; }

  /* ─── Task Card ─── */
  .task-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 8px;
    box-shadow: var(--shadow-card);
    transition: all 0.2s var(--ease-smooth);
    cursor: default;
  }
  .task-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }
  .task-card.expanded { border-color: var(--accent-soft); }

  .task-card-top { display: flex; align-items: flex-start; gap: 12px; }
  .task-checkbox {
    width: 20px; height: 20px; border-radius: 99px;
    border: 2px solid var(--border);
    cursor: pointer; flex-shrink: 0; margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s var(--ease-spring);
    background: transparent;
  }
  .task-checkbox:hover { border-color: var(--checkbox-color); background: var(--accent-soft); }
  .task-checkbox.checked { background: var(--checkbox-color); border-color: var(--checkbox-color); }
  .task-checkbox.checked::after {
    content: ''; display: block;
    width: 5px; height: 8px;
    border: 2px solid white; border-top: none; border-left: none;
    transform: rotate(42deg) translate(-1px, -1px);
  }

  .task-body { flex: 1; min-width: 0; }
  .task-title {
    font-size: 0.9rem; font-weight: 500; color: var(--text-primary);
    line-height: 1.4; transition: all 0.2s;
  }
  .task-title.done { text-decoration: line-through; color: var(--text-muted); }
  .task-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 7px; align-items: center; }

  .tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 9px; border-radius: 99px;
    font-size: 0.7rem; font-weight: 600;
  }
  .tag-household { background: var(--tag-household); color: var(--tag-household-text); }
  .tag-personal  { background: var(--tag-personal);  color: var(--tag-personal-text); }
  .tag-work      { background: var(--tag-work);      color: var(--tag-work-text); }
  .tag-yoga      { background: var(--tag-yoga);      color: var(--tag-yoga-text); }
  .tag-default   { background: var(--border); color: var(--text-secondary); }

  .meta-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 7px; border-radius: 8px;
    font-size: 0.7rem; color: var(--text-muted);
    background: var(--bg-surface2); border: 1px solid var(--border-soft);
  }
  .meta-chip.deadline-near { color: #f97316; background: #fff7ed; border-color: #fed7aa; }
  .meta-chip.deadline-over { color: #ef4444; background: #fef2f2; border-color: #fecaca; }
  [data-theme="dark"] .meta-chip.deadline-near { color: #fb923c; background: #1c1207; border-color: #431407; }
  [data-theme="dark"] .meta-chip.deadline-over { color: #f87171; background: #1c0707; border-color: #450a0a; }

  .task-actions {
    display: flex; align-items: center; gap: 4px; flex-shrink: 0; margin-left: 4px;
  }
  .task-action-btn {
    width: 28px; height: 28px; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); background: transparent; border: none;
    transition: all 0.15s; font-size: 0.8rem;
  }
  .task-action-btn:hover { background: var(--bg-surface2); color: var(--text-secondary); }

  /* ─── Expanded Panel ─── */
  .task-expand {
    overflow: hidden; max-height: 0;
    transition: max-height 0.3s var(--ease-smooth), opacity 0.2s;
    opacity: 0;
  }
  .task-expand.open { max-height: 600px; opacity: 1; }
  .task-expand-inner { padding-top: 12px; border-top: 1px solid var(--border-soft); margin-top: 12px; }
  .expand-notes {
    font-size: 0.82rem; color: var(--text-secondary);
    background: var(--bg-surface2); border-radius: 10px;
    padding: 10px 12px; margin-bottom: 10px; line-height: 1.6;
    white-space: pre-wrap;
  }
  .subtask-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border-soft);
  }
  .subtask-item:last-child { border-bottom: none; }
  .subtask-check {
    width: 16px; height: 16px; border-radius: 5px;
    border: 1.5px solid var(--border); cursor: pointer;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; background: transparent;
  }
  .subtask-check:hover { border-color: var(--checkbox-color); }
  .subtask-check.checked { background: var(--checkbox-color); border-color: var(--checkbox-color); }
  .subtask-check.checked::after {
    content: ''; width: 4px; height: 6px;
    border: 1.5px solid white; border-top: none; border-left: none;
    transform: rotate(42deg) translate(-1px, -1px); display: block;
  }
  .subtask-label { font-size: 0.82rem; color: var(--text-secondary); flex: 1; }
  .subtask-label.done { text-decoration: line-through; color: var(--text-muted); }

  /* ─── Empty State ─── */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 80px 24px; gap: 12px; text-align: center;
  }
  .empty-emoji { font-size: 3rem; }
  .empty-title { font-size: 1.1rem; color: var(--text-secondary); font-family: 'DM Serif Display', serif; }
  .empty-sub { font-size: 0.8rem; color: var(--text-muted); max-width: 240px; line-height: 1.6; }

  /* ─── Modal Overlay ─── */
  #modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); backdrop-filter: blur(6px);
    z-index: 100; display: none; align-items: flex-end; justify-content: center;
    padding: 20px;
  }
  #modal-overlay.open { display: flex; animation: fadeIn 0.2s; }
  @media (min-width: 640px) { #modal-overlay { align-items: center; } }

  #task-modal {
    background: var(--bg-surface);
    border-radius: 24px; width: 100%; max-width: 560px; max-height: 90vh;
    overflow-y: auto; box-shadow: var(--shadow-modal);
    animation: slideUp 0.28s var(--ease-spring);
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(32px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal-header {
    padding: 22px 24px 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-size: 1.2rem; color: var(--text-primary); }
  .modal-close {
    width: 32px; height: 32px; border-radius: 99px; border: none; cursor: pointer;
    background: var(--bg-surface2); color: var(--text-muted); font-size: 0.85rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .modal-close:hover { background: var(--border); color: var(--text-primary); }

  .modal-body { padding: 20px 24px 24px; }
  .form-field { margin-bottom: 16px; }
  .form-label { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em; color: var(--text-secondary); margin-bottom: 6px; display: block; }
  .form-input, .form-select, .form-textarea {
    width: 100%; padding: 11px 14px; border-radius: 12px;
    border: 1.5px solid var(--border); background: var(--bg-surface2);
    color: var(--text-primary); font-size: 0.875rem; font-family: 'DM Sans', sans-serif;
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .form-textarea { resize: none; min-height: 80px; line-height: 1.5; }
  .form-select option { background: var(--bg-surface); }

  .intend-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .intend-btn {
    flex: 1; min-width: 80px; padding: 9px 14px; border-radius: 12px;
    border: 1.5px solid var(--border); background: var(--bg-surface2);
    color: var(--text-secondary); font-size: 0.8rem; font-weight: 600;
    cursor: pointer; text-align: center; transition: all 0.15s var(--ease-spring);
  }
  .intend-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  .intend-btn.active { border-color: var(--accent); background: var(--accent); color: white; }

  .subtask-builder { display: flex; flex-direction: column; gap: 6px; }
  .subtask-row {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-surface2); border-radius: 10px;
    padding: 8px 10px; border: 1px solid var(--border-soft);
  }
  .subtask-row input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text-primary); font-size: 0.83rem; font-family: 'DM Sans', sans-serif;
  }
  .subtask-row input::placeholder { color: var(--text-muted); }
  .subtask-remove {
    color: var(--text-muted); cursor: pointer; font-size: 0.8rem; padding: 2px 4px;
    transition: color 0.12s; background: none; border: none;
  }
  .subtask-remove:hover { color: #ef4444; }
  .add-subtask-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 12px; border-radius: 10px; cursor: pointer;
    color: var(--accent); font-size: 0.8rem; font-weight: 600;
    background: var(--accent-soft); border: 1.5px dashed var(--accent);
    transition: all 0.15s; width: 100%; justify-content: center;
  }
  .add-subtask-btn:hover { background: var(--accent); color: white; }

  .modal-footer {
    display: flex; gap: 10px; justify-content: flex-end;
    padding: 0 24px 24px;
  }
  .btn-secondary {
    padding: 10px 20px; border-radius: 12px;
    border: 1.5px solid var(--border); background: transparent;
    color: var(--text-secondary); font-size: 0.875rem; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-secondary:hover { background: var(--border-soft); color: var(--text-primary); }
  .btn-primary {
    padding: 10px 22px; border-radius: 12px;
    background: var(--accent); border: none;
    color: white; font-size: 0.875rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s var(--ease-spring);
  }
  .btn-primary:hover { transform: translateY(-1px); background: var(--accent-hover); box-shadow: 0 4px 14px rgba(244,114,168,0.4); }
  .btn-primary:active { transform: translateY(0); }

  /* ─── Auth Screen ─── */
  #auth-screen {
    display: none; position: fixed; inset: 0;
    background: var(--bg-base); z-index: 200;
    align-items: center; justify-content: center;
  }
  #auth-screen.show { display: flex; }
  .auth-card {
    background: var(--bg-surface); border: 1px solid var(--border);
    border-radius: 24px; padding: 40px 36px; width: 100%; max-width: 400px;
    box-shadow: var(--shadow-modal);
  }
  .auth-logo { text-align: center; margin-bottom: 28px; }
  .auth-logo h1 { font-size: 1.8rem; color: var(--text-primary); }
  .auth-logo p { font-size: 0.8rem; color: var(--text-muted); margin-top: 6px; }
  .auth-tabs { display: flex; background: var(--bg-surface2); border-radius: 12px; padding: 4px; margin-bottom: 24px; }
  .auth-tab {
    flex: 1; text-align: center; padding: 8px; border-radius: 9px;
    font-size: 0.8rem; font-weight: 600; cursor: pointer; color: var(--text-muted);
    transition: all 0.2s;
  }
  .auth-tab.active { background: var(--bg-surface); color: var(--text-primary); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .auth-form-title { font-size: 1.1rem; color: var(--text-primary); margin-bottom: 18px; }
  .auth-err {
    background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
    border-radius: 10px; padding: 10px 14px; font-size: 0.8rem; margin-bottom: 14px;
    display: none;
  }
  [data-theme="dark"] .auth-err { background: #1c0707; border-color: #450a0a; color: #f87171; }
  .auth-err.show { display: block; }

  /* ─── Loading Spinner ─── */
  .spinner {
    width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── Toast ─── */
  #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 500; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--bg-surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px;
    box-shadow: var(--shadow-hover); font-size: 0.82rem; color: var(--text-primary);
    animation: toastIn 0.25s var(--ease-spring);
    display: flex; align-items: center; gap: 10px; min-width: 200px;
  }
  .toast.success .toast-icon { color: #22c55e; }
  .toast.error .toast-icon { color: #ef4444; }
  @keyframes toastIn { from { opacity: 0; transform: translateY(12px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

  /* ─── Logbook / Completed ─── */
  .task-card.completed-card { opacity: 0.6; }
  .task-card.completed-card:hover { opacity: 0.85; }

  /* ─── Loading state ─── */
  .skeleton { background: linear-gradient(90deg, var(--border-soft) 25%, var(--bg-surface2) 50%, var(--border-soft) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 10px; }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* ─── Progress bar for subtasks ─── */
  .subtask-progress-bar { height: 3px; background: var(--border-soft); border-radius: 99px; overflow: hidden; margin-top: 6px; }
  .subtask-progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.3s var(--ease-smooth); }

  /* ─── Responsive ─── */
  @media (max-width: 640px) {
    #sidebar { display: none; }
    #main { width: 100%; }
    #topbar { padding: 16px 16px 0; }
    #content-area { padding: 16px 16px 32px; }
  }
</style>
</head>
<body>

<!-- Auth Screen -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>Together ✦</h1>
      <p>Your shared space for getting things done</p>
    </div>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchAuthTab('login')">Sign In</div>
    </div>
    <div id="auth-error" class="auth-err"></div>
    <div id="login-form">
      <div class="form-field">
        <label class="form-label">Email</label>
        <input id="login-email" type="email" class="form-input" placeholder="you@example.com" />
      </div>
      <div class="form-field">
        <label class="form-label">Password</label>
        <input id="login-password" type="password" class="form-input" placeholder="••••••••" />
      </div>
      <button id="login-btn" class="btn-primary" style="width:100%;margin-top:4px;padding:13px;" onclick="doLogin()">Sign In</button>

    <div id="signup-form" style="display:none;">
      <div class="form-field">
        <label class="form-label">Email</label>

      <div class="form-field">
        <label class="form-label">Password</label>
        <input id="signup-password" type="password" class="form-input" placeholder="At least 6 characters" />

      <button id="signup-btn" class="btn-primary" style="width:100%;margin-top:4px;padding:13px;" onclick="doSignup()">Create Account</button>

</div>

<!-- Main App -->
<div id="app" style="display:none;">
  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-logo">
      <h1>Together ✦</h1>
      <span>Couples' GTD</span>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="user-avatar-initials">?</div>
      <div class="user-email" id="user-email-display">loading...</div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Views</div>
      <div class="nav-item active" data-view="inbox" onclick="switchView('inbox')">
        <span class="icon">📥</span> Inbox <span class="nav-badge" id="badge-inbox" style="display:none">0</span>
      </div>
      <div class="nav-item" data-view="today" onclick="switchView('today')">
        <span class="icon">☀️</span> Today <span class="nav-badge" id="badge-today" style="display:none">0</span>
      </div>
      <div class="nav-item" data-view="upcoming" onclick="switchView('upcoming')">
        <span class="icon">📅</span> Upcoming
      </div>
      <div class="nav-item" data-view="anytime" onclick="switchView('anytime')">
        <span class="icon">☁️</span> Anytime
      </div>
      <div class="nav-item" data-view="logbook" onclick="switchView('logbook')">
        <span class="icon">✅</span> Logbook
      </div>
    </div>
    <div class="sidebar-bottom">
      <div class="sidebar-btn" onclick="toggleTheme()">
        <i id="theme-icon" class="fa-solid fa-sun"></i>
        <span id="theme-label">Light</span>
      </div>
      <div class="sidebar-btn" onclick="doLogout()">
        <i class="fa-solid fa-right-from-bracket"></i>
        <span>Out</span>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main id="main">
    <div id="topbar">
      <div>
        <h2 class="view-title" id="view-title">Inbox</h2>
        <p class="view-subtitle" id="view-subtitle">Tasks waiting to be sorted</p>
      </div>
      <button class="add-task-btn" onclick="openModal()">
        <i class="fa-solid fa-plus"></i> New Task
      </button>
    </div>
    <div id="content-area">
      <div class="empty-state">
        <div class="spinner" style="width:28px;height:28px;border-color:var(--border);border-top-color:var(--accent);"></div>
      </div>
    </div>
  </main>
</div>

<!-- Task Modal -->
<div id="modal-overlay" onclick="handleOverlayClick(event)">
  <div id="task-modal">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-title">New Task</h3>
      <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-task-id" />
      <div class="form-field">
        <label class="form-label">Title</label>
        <input id="task-title" type="text" class="form-input" placeholder="What needs to be done?" />
      </div>
      <div class="form-field">
        <label class="form-label">Category</label>
        <select id="task-category" class="form-select">
          <option value="">— No Category —</option>
          <option value="Household">🏠 Household</option>
          <option value="Personal">🌸 Personal</option>
          <option value="Work">💻 Work</option>
          <option value="Yoga">🧘‍♀️ Yoga</option>
        </select>
      </div>
      <div class="form-field">
        <label class="form-label">Intend to Do</label>
        <div class="intend-btns">
          <div class="intend-btn" data-intend="today"    onclick="selectIntend('today')">☀️ Today</div>
          <div class="intend-btn" data-intend="tomorrow" onclick="selectIntend('tomorrow')">🌅 Tomorrow</div>
          <div class="intend-btn" data-intend="anytime"  onclick="selectIntend('anytime')">☁️ Anytime</div>
        </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-field">
          <label class="form-label">Deadline (optional)</label>
          <input id="task-deadline" type="date" class="form-input" />
        </div>
        <div class="form-field">
          <label class="form-label">Repeat</label>
          <select id="task-repeat" class="form-select">
            <option value="none">One-time</option>
            <option value="daily">🔁 Daily</option>
            <option value="weekly">📅 Weekly</option>
          </select>
        </div>
      </div>
      <div class="form-field">
        <label class="form-label">Notes</label>
        <textarea id="task-notes" class="form-textarea" placeholder="Any extra thoughts…"></textarea>
      </div>
      <div class="form-field">
        <label class="form-label">Subtasks</label>
        <div class="subtask-builder" id="subtask-builder"></div>
        <button class="add-subtask-btn" style="margin-top:8px;" onclick="addSubtaskField()">
          <i class="fa-solid fa-plus"></i> Add Step
        </button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" id="save-task-btn" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div id="toast-container"></div>

<script>
// ═══════════════════════════════════════════════
//  CONFIGURATION — replace with your Supabase creds
// ═══════════════════════════════════════════════
const SUPABASE_URL  = 'https://kwlivhybgemmollkxnvh.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_3_27s3LsI67fHjXc72pWIQ_SzLav8qQ';

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser   = null;
let currentView   = 'inbox';
let allTasks      = [];
let editingTaskId = null;
let selectedIntend = '';

// Category config
const CAT = {
  Household: { emoji: '🏠', cls: 'tag-household' },
  Personal:  { emoji: '🌸', cls: 'tag-personal' },
  Work:      { emoji: '💻', cls: 'tag-work' },
  Yoga:      { emoji: '🧘‍♀️', cls: 'tag-yoga' },
};

const VIEW_META = {
  inbox:    { title: 'Inbox',    subtitle: 'Tasks waiting to be sorted',       emoji: '📥' },
  today:    { title: 'Today',    subtitle: 'What you\'re getting done today',   emoji: '☀️' },
  upcoming: { title: 'Upcoming', subtitle: 'On the horizon',                    emoji: '📅' },
  anytime:  { title: 'Anytime',  subtitle: 'No rush — whenever feels right',    emoji: '☁️' },
  logbook:  { title: 'Logbook',  subtitle: 'All the things you\'ve accomplished ✦', emoji: '✅' },
};

// ─── Theme ───────────────────────────────────────
function initTheme() {
  const saved = localStorage.getItem('gtd-theme') || 'pink';
  applyTheme(saved);
}
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const icon  = document.getElementById('theme-icon');
  const label = document.getElementById('theme-label');
  if (theme === 'dark') {
    icon.className  = 'fa-solid fa-moon';
    label.textContent = 'Dark';
  } else {
    icon.className  = 'fa-solid fa-sun';
    label.textContent = 'Light';
  }
  localStorage.setItem('gtd-theme', theme);
}
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  applyTheme(current === 'dark' ? 'pink' : 'dark');
}

// ─── Auth ─────────────────────────────────────────
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0 && tab==='login')||(i===1 && tab==='signup')));
  document.getElementById('login-form').style.display  = tab === 'login'  ? '' : 'none';
  document.getElementById('signup-form').style.display = tab === 'signup' ? '' : 'none';
  document.getElementById('auth-error').classList.remove('show');
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-password').value;
  const btn   = document.getElementById('login-btn');
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled  = true;
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  btn.innerHTML = 'Sign In'; btn.disabled = false;
  if (error) { showAuthError(error.message); return; }
}

async function doSignup() {
  const email = document.getElementById('signup-email').value.trim();
  const pass  = document.getElementById('signup-password').value;
  const btn   = document.getElementById('signup-btn');
  btn.innerHTML = '<span class="spinner"></span>'; btn.disabled = true;
  const { error } = await sb.auth.signUp({ email, password: pass });
  btn.innerHTML = 'Create Account'; btn.disabled = false;
  if (error) { showAuthError(error.message); return; }
  showAuthError('Check your email to confirm your account!', false);
}

function showAuthError(msg, isErr = true) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.background = isErr ? '' : '#f0fdf4';
  el.style.borderColor = isErr ? '' : '#bbf7d0';
  el.style.color = isErr ? '' : '#15803d';
  el.classList.add('show');
}

async function doLogout() {
  await sb.auth.signOut();
}

// ─── Session management ───────────────────────────
sb.auth.onAuthStateChange(async (event, session) => {
  if (session?.user) {
    currentUser = session.user;
    showApp();
    await loadTasks();
  } else {
    currentUser = null;
    showAuth();
  }
});

function showApp() {
  document.getElementById('auth-screen').classList.remove('show');
  document.getElementById('app').style.display = 'flex';
  const email = currentUser.email || '';
  document.getElementById('user-email-display').textContent = email;
  document.getElementById('user-avatar-initials').textContent = email.charAt(0).toUpperCase();
}
function showAuth() {
  document.getElementById('auth-screen').classList.add('show');
  document.getElementById('app').style.display = 'none';
}

// ─── Data ─────────────────────────────────────────
async function loadTasks() {
  const { data, error } = await sb
    .from('todos')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('created_at', { ascending: false });
  if (error) { showToast('Error loading tasks', 'error'); return; }
  allTasks = data || [];
  renderCurrentView();
  updateBadges();
}

async function saveTask() {
  const title = document.getElementById('task-title').value.trim();
  if (!title) { document.getElementById('task-title').focus(); return; }

  const subtasks = collectSubtasks();
  const payload = {
    user_id:     currentUser.id,
    title,
    category:    document.getElementById('task-category').value || null,
    intend_date: selectedIntend || null,
    deadline:    document.getElementById('task-deadline').value || null,
    is_repeat:   document.getElementById('task-repeat').value,
    notes:       document.getElementById('task-notes').value.trim() || null,
    subtasks,
    is_completed: false,
  };

  const btn = document.getElementById('save-task-btn');
  btn.innerHTML = '<span class="spinner"></span>'; btn.disabled = true;

  let error;
  if (editingTaskId) {
    ({ error } = await sb.from('todos').update(payload).eq('id', editingTaskId));
  } else {
    ({ error } = await sb.from('todos').insert(payload));
  }
  btn.innerHTML = 'Save Task'; btn.disabled = false;

  if (error) { showToast('Could not save task', 'error'); return; }
  showToast(editingTaskId ? 'Task updated ✦' : 'Task added ✦', 'success');
  closeModal();
  await loadTasks();
}

async function toggleComplete(id) {
  const task = allTasks.find(t => t.id === id);
  if (!task) return;
  const { error } = await sb.from('todos').update({ is_completed: !task.is_completed }).eq('id', id);
  if (error) { showToast('Could not update task', 'error'); return; }
  task.is_completed = !task.is_completed;
  renderCurrentView();
  updateBadges();
  if (task.is_completed) showToast('Done! Great work ✦', 'success');
}

async function toggleSubtask(taskId, idx) {
  const task = allTasks.find(t => t.id === taskId);
  if (!task || !task.subtasks) return;
  const subs = [...task.subtasks];
  subs[idx] = { ...subs[idx], done: !subs[idx].done };
  const { error } = await sb.from('todos').update({ subtasks: subs }).eq('id', taskId);
  if (error) return;
  task.subtasks = subs;
  // Re-render just that card's expand area
  const progressEl = document.getElementById(`progress-${taskId}`);
  const subtasksEl = document.getElementById(`subtasks-${taskId}`);
  if (progressEl && subtasksEl) {
    const done = subs.filter(s => s.done).length;
    progressEl.style.width = `${(done / subs.length) * 100}%`;
    subtasksEl.innerHTML = renderSubtaskChecklist(subs, taskId);
  }
}

async function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  const { error } = await sb.from('todos').delete().eq('id', id);
  if (error) { showToast('Could not delete', 'error'); return; }
  allTasks = allTasks.filter(t => t.id !== id);
  showToast('Task removed', 'success');
  renderCurrentView();
  updateBadges();
}

function openEditModal(id) {
  const task = allTasks.find(t => t.id === id);
  if (!task) return;
  editingTaskId = id;
  document.getElementById('modal-title').textContent = 'Edit Task';
  document.getElementById('edit-task-id').value = id;
  document.getElementById('task-title').value = task.title || '';
  document.getElementById('task-category').value = task.category || '';
  document.getElementById('task-deadline').value = task.deadline || '';
  document.getElementById('task-repeat').value = task.is_repeat || 'none';
  document.getElementById('task-notes').value = task.notes || '';
  selectedIntend = task.intend_date || '';
  document.querySelectorAll('.intend-btn').forEach(b => b.classList.toggle('active', b.dataset.intend === selectedIntend));
  // Subtasks
  const builder = document.getElementById('subtask-builder');
  builder.innerHTML = '';
  (task.subtasks || []).forEach(s => addSubtaskField(s.text));
  document.getElementById('modal-overlay').classList.add('open');
}

// ─── View Rendering ───────────────────────────────
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.view === view));
  const meta = VIEW_META[view];
  document.getElementById('view-title').textContent = meta.title;
  document.getElementById('view-subtitle').textContent = meta.subtitle;
  renderCurrentView();
}

function renderCurrentView() {
  const area = document.getElementById('content-area');
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = today.toISOString().split('T')[0];
  const tomorrowStr = new Date(today.getTime() + 86400000).toISOString().split('T')[0];

  let tasks = [];
  switch (currentView) {
    case 'inbox':
      tasks = allTasks.filter(t => !t.is_completed && !t.intend_date && !t.category);
      break;
    case 'today':
      tasks = allTasks.filter(t => !t.is_completed && t.intend_date === 'today');
      break;
    case 'upcoming':
      tasks = allTasks.filter(t => {
        if (t.is_completed) return false;
        if (t.intend_date === 'tomorrow') return true;
        if (t.deadline) {
          const d = new Date(t.deadline); d.setHours(0,0,0,0);
          return d > today;
        }
        return false;
      });
      tasks.sort((a, b) => {
        const da = a.deadline ? new Date(a.deadline) : new Date('9999-12-31');
        const db = b.deadline ? new Date(b.deadline) : new Date('9999-12-31');
        return da - db;
      });
      break;
    case 'anytime':
      tasks = allTasks.filter(t => !t.is_completed && t.intend_date === 'anytime');
      break;
    case 'logbook':
      tasks = allTasks.filter(t => t.is_completed).reverse();
      break;
  }

  if (tasks.length === 0) {
    area.innerHTML = emptyState(currentView);
    return;
  }

  // Group by category for today/upcoming
  if (currentView === 'today' || currentView === 'upcoming') {
    area.innerHTML = renderGrouped(tasks);
  } else {
    area.innerHTML = `<div>${tasks.map(t => renderTaskCard(t)).join('')}</div>`;
  }
}

function renderGrouped(tasks) {
  const groups = {};
  const order = ['Household','Personal','Work','Yoga',''];
  tasks.forEach(t => {
    const key = t.category || '';
    if (!groups[key]) groups[key] = [];
    groups[key].push(t);
  });
  let html = '';
  order.forEach(cat => {
    if (!groups[cat]) return;
    const cfg = CAT[cat];
    html += `<div class="category-group">
      <div class="category-group-header">
        <span class="cat-emoji">${cfg ? cfg.emoji : '📌'}</span>
        <h3>${cat || 'Uncategorized'}</h3>
        <span style="font-size:0.7rem;color:var(--text-muted);margin-left:4px;">${groups[cat].length}</span>
      </div>
      ${groups[cat].map(t => renderTaskCard(t)).join('')}
    </div>`;
  });
  return html;
}

function renderTaskCard(task) {
  const cfg = CAT[task.category];
  const today = new Date(); today.setHours(0,0,0,0);
  let deadlineChip = '';
  if (task.deadline) {
    const d = new Date(task.deadline); d.setHours(0,0,0,0);
    const diff = Math.round((d - today) / 86400000);
    let cls = 'meta-chip';
    let label = formatDate(task.deadline);
    if (diff < 0) { cls += ' deadline-over'; label = 'Overdue'; }
    else if (diff === 0) { cls += ' deadline-near'; label = 'Today'; }
    else if (diff <= 2) { cls += ' deadline-near'; }
    deadlineChip = `<span class="${cls}"><i class="fa-regular fa-calendar-check" style="font-size:.65rem;"></i> ${label}</span>`;
  }
  let repeatChip = '';
  if (task.is_repeat && task.is_repeat !== 'none') {
    const icon = task.is_repeat === 'daily' ? 'fa-rotate' : 'fa-calendar-week';
    repeatChip = `<span class="meta-chip"><i class="fa-solid ${icon}" style="font-size:.65rem;"></i> ${task.is_repeat}</span>`;
  }
  const catTag = cfg
    ? `<span class="tag ${cfg.cls}">${cfg.emoji} ${task.category}</span>`
    : (task.category ? `<span class="tag tag-default">📌 ${task.category}</span>` : '');

  const subs = task.subtasks || [];
  const doneSubs = subs.filter(s => s.done).length;
  const subProgress = subs.length > 0
    ? `<span class="meta-chip"><i class="fa-solid fa-list-check" style="font-size:.65rem;"></i> ${doneSubs}/${subs.length}</span>`
    : '';

  const hasExpand = (task.notes || subs.length > 0);
  const expandBtn = hasExpand
    ? `<button class="task-action-btn" onclick="toggleExpand('${task.id}')" id="expand-btn-${task.id}" title="Details"><i class="fa-solid fa-chevron-down"></i></button>`
    : '';

  const expandInner = hasExpand ? `
    <div class="task-expand" id="expand-${task.id}">
      <div class="task-expand-inner">
        ${task.notes ? `<div class="expand-notes">${escHtml(task.notes)}</div>` : ''}
        ${subs.length > 0 ? `
          <div class="subtask-progress-bar"><div class="subtask-progress-fill" id="progress-${task.id}" style="width:${(doneSubs/subs.length*100)}%"></div></div>
          <div style="margin-top:8px;" id="subtasks-${task.id}">${renderSubtaskChecklist(subs, task.id)}</div>
        ` : ''}
      </div>
    </div>` : '';

  return `
  <div class="task-card ${task.is_completed ? 'completed-card' : ''}" id="card-${task.id}">
    <div class="task-card-top">
      <div class="task-checkbox ${task.is_completed ? 'checked' : ''}" onclick="toggleComplete('${task.id}')"></div>
      <div class="task-body">
        <div class="task-title ${task.is_completed ? 'done' : ''}">${escHtml(task.title)}</div>
        <div class="task-meta">
          ${catTag}
          ${deadlineChip}
          ${repeatChip}
          ${subProgress}
        </div>
      </div>
      <div class="task-actions">
        ${expandBtn}
        <button class="task-action-btn" onclick="openEditModal('${task.id}')" title="Edit"><i class="fa-solid fa-pen"></i></button>
        <button class="task-action-btn" onclick="deleteTask('${task.id}')" title="Delete" style="color:var(--text-muted)"><i class="fa-regular fa-trash-can"></i></button>
      </div>
    </div>
    ${expandInner}
  </div>`;
}

function renderSubtaskChecklist(subs, taskId) {
  return subs.map((s, i) => `
    <div class="subtask-item">
      <div class="subtask-check ${s.done ? 'checked' : ''}" onclick="toggleSubtask('${taskId}', ${i})"></div>
      <span class="subtask-label ${s.done ? 'done' : ''}">${escHtml(s.text)}</span>
    </div>`).join('');
}

function toggleExpand(id) {
  const el  = document.getElementById(`expand-${id}`);
  const btn = document.getElementById(`expand-btn-${id}`);
  if (!el) return;
  const isOpen = el.classList.toggle('open');
  if (btn) {
    btn.querySelector('i').style.transform = isOpen ? 'rotate(180deg)' : '';
    btn.querySelector('i').style.transition = 'transform 0.2s';
  }
  const card = document.getElementById(`card-${id}`);
  if (card) card.classList.toggle('expanded', isOpen);
}

function emptyState(view) {
  const map = {
    inbox:    { e:'📥', t:'Inbox is clear', s:'Tap "New Task" to capture a thought' },
    today:    { e:'☀️', t:'Nothing planned today', s:'Move some tasks here to get started' },
    upcoming: { e:'📅', t:'No upcoming tasks', s:'Set a deadline or "Tomorrow" on your tasks' },
    anytime:  { e:'☁️', t:'Nothing in Anytime', s:'Add tasks you\'ll get to someday' },
    logbook:  { e:'✅', t:'No completed tasks yet', s:'Your accomplishments will appear here' },
  };
  const { e, t, s } = map[view] || { e:'📋', t:'All clear', s:'' };
  return `<div class="empty-state"><div class="empty-emoji">${e}</div><div class="empty-title">${t}</div><div class="empty-sub">${s}</div></div>`;
}

function updateBadges() {
  const todayCount  = allTasks.filter(t => !t.is_completed && t.intend_date === 'today').length;
  const inboxCount  = allTasks.filter(t => !t.is_completed && !t.intend_date && !t.category).length;
  setBadge('badge-today',  todayCount);
  setBadge('badge-inbox',  inboxCount);
}
function setBadge(id, n) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.display = n > 0 ? '' : 'none';
  el.textContent = n;
}

// ─── Modal ────────────────────────────────────────
function openModal() {
  editingTaskId = null;
  document.getElementById('modal-title').textContent = 'New Task';
  document.getElementById('edit-task-id').value = '';
  document.getElementById('task-title').value = '';
  document.getElementById('task-category').value = '';
  document.getElementById('task-deadline').value = '';
  document.getElementById('task-repeat').value = 'none';
  document.getElementById('task-notes').value = '';
  document.getElementById('subtask-builder').innerHTML = '';
  selectedIntend = '';
  document.querySelectorAll('.intend-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('task-title').focus(), 120);
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function selectIntend(val) {
  selectedIntend = val;
  document.querySelectorAll('.intend-btn').forEach(b => b.classList.toggle('active', b.dataset.intend === val));
}

// ─── Subtask Builder ─────────────────────────────
function addSubtaskField(value = '') {
  const builder = document.getElementById('subtask-builder');
  const row = document.createElement('div');
  row.className = 'subtask-row';
  row.innerHTML = `<i class="fa-solid fa-grip-lines" style="color:var(--text-muted);font-size:.75rem;cursor:grab;"></i>
    <input type="text" placeholder="Subtask step…" value="${escHtml(value)}" />
    <button class="subtask-remove" onclick="this.parentElement.remove()"><i class="fa-solid fa-xmark"></i></button>`;
  builder.appendChild(row);
  row.querySelector('input').focus();
}

function collectSubtasks() {
  const inputs = document.querySelectorAll('#subtask-builder .subtask-row input');
  return Array.from(inputs).map(inp => inp.value.trim()).filter(Boolean).map(text => ({ text, done: false }));
}

// ─── Helpers ─────────────────────────────────────
function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// ─── Toast ───────────────────────────────────────
function showToast(msg, type = 'success') {
  const container = document.getElementById('toast-container');
  const icons = { success: 'fa-circle-check', error: 'fa-circle-xmark' };
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<i class="fa-solid ${icons[type] || icons.success} toast-icon"></i>${msg}`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// ─── Init ─────────────────────────────────────────
initTheme();
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) {
    currentUser = session.user;
    showApp();
    await loadTasks();
  } else {
    showAuth();
  }
})();
</script>
